<html>
  <head>
    <title>KNotes - Notepad for eReaders</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.11.0/jszip.min.js"></script>
    <script>
document.getElementById('export').addEventListener('click', async () => {
  const text = document.getElementById('textbox').value;
  if (!text.trim()) {
    alert("Please write something first!");
    return;
  }

  const zip = new JSZip();

  // Add mimetype (must be uncompressed)
  zip.file("mimetype", "application/epub+zip", { compression: "STORE" });

  // META-INF/container.xml
  zip.folder("META-INF").file("container.xml", `
<?xml version="1.0"?>
<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container">
   <rootfiles>
      <rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/>
   </rootfiles>
</container>
  `.trim());

  // OEBPS/content.xhtml
  zip.folder("OEBPS").file("content.xhtml", `
<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head><title>New KNote</title></head>
<body>
<p>${text.replace(/\n/g, "<br/>")}</p>
</body>
</html>
  `.trim());

  // OEBPS/content.opf
  zip.folder("OEBPS").file("content.opf", `
<?xml version="1.0" encoding="UTF-8"?>
<package version="2.0" xmlns="http://www.idpf.org/2007/opf" unique-identifier="id">
  <metadata xmlns:dc="http://purl.org/dc/elements/1.1/">
    <dc:title>My Note</dc:title>
    <dc:language>en</dc:language>
    <dc:identifier id="id">note-1</dc:identifier>
  </metadata>
  <manifest>
    <item id="content" href="content.xhtml" media-type="application/xhtml+xml"/>
  </manifest>
  <spine>
    <itemref idref="content"/>
  </spine>
</package>
  `.trim());

  // Generate EPUB
  const blob = await zip.generateAsync({ type: "blob" });

  // Trigger download
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "note.epub";
  a.click();
});
</script>
  </head>
  <body>
    <h1>KNotes</h1>
    <h2>The Notepad for eReaders</h2>
    <p>Under construction! Please check back later.</p>
    <textarea rows="10" cols="40" placeholder="Begin writing..." id="textbox"></textarea>
    <button id="export">Export to eReader</button>
  </body>
</html>
