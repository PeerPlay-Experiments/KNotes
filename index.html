<html>
  <head>
    <title>KNotes - Notepad for eReaders</title>
    <meta charset="UTF-8">
  </head>
  <body>
    <h1>KNotes</h1>
    <h2>The Notepad for eReaders</h2>
    <p>Under construction!</p>
    <textarea rows="10" cols="40" placeholder="Begin writing..." id="textbox"></textarea>
    <button id="export">Export to eReader</button>
    <div id="link-container"></div>

  <script>
    const exportBtn = document.getElementById("export");
    const textbox = document.getElementById("textbox");
    const linkContainer = document.getElementById("link-container");

    exportBtn.addEventListener("click", function() {
      const text = textbox.value;
      if (!text.trim()) {
        alert("Please write something first!");
        return;
      }

   
      // Create a Blob
      const blob = new Blob([text], { type: "text/plain" });

      // Create a downloadable link
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "note.txt";
      a.textContent = "Click here to download your note";

      // Clear previous link, append new one
      linkContainer.innerHTML = "";
      linkContainer.appendChild(a);
    });
  </script>
  </body>
</html>
